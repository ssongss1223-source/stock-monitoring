version: "2.0"
description: "매수 등급 기준 (전략서 11장). 장세별 독립 임계값 적용."

# trend_score = TechnicalResult.total_score (MA + 일목균형표, 최대 ~17점)
# volume_score = VolumeResult.volume_score  (60분봉 기반, 그룹 cap 적용 최대 19점)
# total_min = trend_score + volume_score 합산 최소값

market_regime:
  bull:
    condition: market_bias >= 8
  sideways:
    condition: market_bias >= 5 and market_bias <= 7
  bear:
    condition: market_bias <= 4

buy_grade:
  S:
    bull:
      trend_min: 12
      volume_min: 13
      total_min: 28
    sideways:
      trend_min: 13
      volume_min: 14
      total_min: 31
    bear:
      allowed: false

  A:
    bull:
      trend_min: 9
      volume_min: 10
      total_min: 23
    sideways:
      trend_min: 10
      volume_min: 11
      total_min: 26
    bear:
      trend_min: 13
      volume_min: 13
      total_min: 30

  B:
    bull:
      trend_min: 6
      volume_min: 7
      total_min: 17
    sideways:
      trend_min: 7
      volume_min: 8
      total_min: 20
    bear:
      trend_min: 10
      volume_min: 12
      total_min: 27
