version: "2.0"
description: "60분봉 기반 종목별 거래량 행동 프로파일링"

# 종목마다 자신의 60분봉 히스토리에서 P90/P95/P99 임계값을 산출
# → 삼성전자의 '이상 거래량'과 소형주의 '이상 거래량' 기준이 각각 다르게 적용됨

rules:
  - id: hourly_vol_ratio_p95
    points: 5
    description: "동일 시간대 거래량 P95 이상 (핵심 이상 수급 신호)"

  - id: hourly_vol_zscore_high
    points: 4
    description: "60분봉 거래량 z-score >= 2.0 (과거 분포 대비 통계적 이상치)"

  - id: relative_turnover_high
    points: 3
    description: "당일 거래대금 합산 P80 이상 (종목 규모 대비 관심도)"

  - id: vwap_above_60m
    points: 2
    description: "장 마감 종가 > 당일 VWAP (매수세 우위)"

  - id: obv_slope_up_60m
    points: 3
    description: "최근 20개 60분봉 OBV 기울기 양수 (단기 자금 유입)"

  - id: obv_divergence_60m
    points: 3
    description: "OBV 다이버전스: 가격 횡보(-2%~+3%) 중 OBV 우상향 (조용한 매집 탐지)"

  - id: obv_acceleration_60m
    points: 2
    description: "OBV 가속: 최근 10봉 기울기 > 이전 10봉 × 1.3 (매집 강도 강화)"

  - id: foreign_inst_buy
    points: 3
    description: "외국인/기관 5거래일 순매수 (스마트머니 중기 유입)"

# 그룹 내 점수 상한 (중복 신호 과대계상 방지)
volume_group_cap:
  intraday_volume_anomaly:
    indicators:
      - hourly_vol_ratio_p95
      - hourly_vol_zscore_high
      - relative_turnover_high
    max_score: 9

  obv_group:
    indicators:
      - obv_slope_up_60m
      - obv_divergence_60m
      - obv_acceleration_60m
    max_score: 5

# 최대 가능 점수: 19점 (intraday 9 + obv 5 + vwap 2 + foreign_inst 3)
thresholds:
  explosion_imminent: 11  # 🔥 58% 이상 — 이상 수급 확인
  monitoring: 7           # 🔶 35% 이상 — 모니터링 대기
  pass_below: 6           # 이하 패스
