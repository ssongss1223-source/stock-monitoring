version: "1.0"
description: "장세 판단 규칙 (전략서 4장). KOSPI/KOSDAQ 독립 적용."

rules:
  - id: index_6m_uptrend
    points: 2
    description: "지수 6개월 추세 상승"
  - id: index_3m_uptrend
    points: 2
    description: "지수 3개월 추세 상승"
  - id: index_1m_uptrend
    points: 1
    description: "지수 1개월 추세 상승"
  - id: index_above_20ma
    points: 1
    description: "지수 종가 > 20일선"
  - id: foreign_futures_net_buy
    points: 2
    description: "외국인 선물 순매수"
  - id: sector_strong_ratio_70pct
    points: 1
    description: "업종 강세 종목 비율 70% 이상"

# 최대 가능 점수: 9점
thresholds:
  bull: 8         # 8점 이상 → 상승장
  sideways_min: 5 # 5~7점   → 횡보장
  bear_max: 4     # 4점 이하 → 하락장

# 매수 등급 임계값에 더해지는 페널티 (차단이 아님, 기준만 높임)
market_bias:
  bull: 0
  sideways: 2
  bear: 5
